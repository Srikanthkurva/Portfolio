<!doctype html>
<html lang="en" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Srikanth Kurva is a React Developer specializing in TypeScript, Tailwind CSS, scalable UI engineering, and responsive web applications."
    />
    <meta
      name="keywords"
      content="Srikanth Kurva, React Developer, Frontend Developer, TypeScript, Tailwind CSS, UI Developer, Portfolio"
    />
    <meta name="author" content="Srikanth Kurva" />
    <meta name="theme-color" content="#0b1421" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:title" content="Srikanth Kurva | React Developer Portfolio" />
    <meta
      property="og:description"
      content="Modern portfolio showcasing React development, frontend engineering skills, and production-ready project work."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com" />
    <meta property="og:image" content="/projects/dashboard.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Srikanth Kurva | React Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Frontend specialist building scalable React interfaces with clean architecture and polished user experiences."
    />
    <meta name="twitter:image" content="/projects/dashboard.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      (() => {
        try {
          const theme = localStorage.getItem('srikanth-theme') === 'light' ? 'light' : 'dark'
          const root = document.documentElement
          root.setAttribute('data-theme', theme)
          root.classList.toggle('dark', theme === 'dark')
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <title>Srikanth Kurva | React Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
